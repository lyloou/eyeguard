name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build EyeGuard.app
        run: |
          xcodebuild -project EyeGuard.xcodeproj \
            -scheme EyeGuard \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO

      - name: Locate built app
        id: app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData/EyeGuard-* -name "EyeGuard.app" -type d 2>/dev/null | grep -v "Intermediate" | head -1)
          echo "path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found: $APP_PATH"

      - name: Package App
        run: |
          cd /tmp
          cp -R "${{ steps.app.outputs.path }}" EyeGuard.app
          zip -r EyeGuard.app.zip EyeGuard.app -x "*.DS_Store"

      - name: Prepare release files
        run: |
          cp /tmp/EyeGuard.app.zip .
          cp eyeguard eyeguard
          cp eyeguard-cli.SKILL.md eyeguard-cli.SKILL.md
          cp scripts/install.sh install.sh

          # Generate README
          VERSION="${GITHUB_REF#refs/tags/v}"
          cat > README.md << 'README_EOF'
# EyeGuard 护眼卫士

macOS 菜单栏护眼提醒 App，帮助你养成健康的工作节奏。

## 一键安装

```bash
bash -c "$(curl -fsSL https://raw.githubusercontent.com/lyloou/eyeguard/vVERSION/install.sh)"
```

或手动安装：

```bash
# 1. 下载并安装 App
curl -fsSL https://github.com/lyloou/eyeguard/releases/latest/download/EyeGuard.app.zip -o /tmp/EyeGuard.app.zip
unzip /tmp/EyeGuard.app.zip -d /Applications/

# 2. 安装 CLI
mkdir -p ~/.eyeguard/bin
curl -fsSL https://github.com/lyloou/eyeguard/releases/latest/download/eyeguard -o ~/.eyeguard/bin/eyeguard
chmod +x ~/.eyeguard/bin/eyeguard
echo 'export PATH="$HOME/.eyeguard/bin:$PATH"' >> ~/.zshrc
source ~/.zshrc

# 3. 开始使用
eyeguard status
```

## 功能

- 🍅 番茄工作法：30min 工作 → 5min 休息
- ⏸ 暂停/继续，不打断节奏
- 🔔 系统通知提醒
- 📊 今日统计
- ⌨️ 全局快捷键：⌘⇧P 暂停、⌘⇧E 继续
- 🔲 锁屏自动暂停

## 状态栏样式

可用 `eyeguard set-style <name>` 切换：

| 名称 | 工作 | 暂停 | 休息 |
|------|------|------|------|
| `classic` | Working 29:59 | Paused 29:59 | Resting 29:59 |
| `minimal` | 29:59 | 29:59 | 29:59 |
| `emoji` | 💼 29:59 | ⏸ 29:59 | 🌿 29:59 |
| `compact` | W 29:59 | P 29:59 | R 29:59 |
| `bracket` | [工作中] 29:59 | [已暂停] 29:59 | [休息中] 29:59 |
| `star` | ☆工作中☆ 29:59 | ☆已暂停☆ 29:59 | ☆休息中☆ 29:59 |
| `dots` | ◐ 29:59 | ⏸ 29:59 | ◐ 29:59 |
| `progressBar` | ████░░░░ 29:59 | ⏸ 29:59 | ████░░░░ 29:59 |

## CLI 命令

```bash
eyeguard status      # 查看状态
eyeguard start       # 开始工作
eyeguard pause       # 暂停
eyeguard resume      # 继续
eyeguard reset       # 重置
eyeguard rest-now    # 立即休息
eyeguard skip        # 跳过休息
eyeguard stats       # 今日统计
eyeguard settings    # 查看配置
eyeguard set-style <name>  # 切换样式
```

---
Built by GitHub Actions
README_EOF
          sed -i "s/vVERSION/v${VERSION}/g" README.md

          ls -la

      - name: Create Release & Upload All
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: EyeGuard ${{ github.ref_name }}
          files: |
            EyeGuard.app.zip
            eyeguard
            eyeguard-cli.SKILL.md
            install.sh
            README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
