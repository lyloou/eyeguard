name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build EyeGuard.app
        run: |
          xcodebuild -project EyeGuard.xcodeproj \
            -scheme EyeGuard \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO

      - name: Locate built app
        id: app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData/EyeGuard-* -name "EyeGuard.app" -type d 2>/dev/null | grep -v "Intermediate" | head -1)
          echo "path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found: $APP_PATH"

      - name: Package App
        run: |
          cd /tmp
          cp -R "${{ steps.app.outputs.path }}" EyeGuard.app
          zip -r EyeGuard.app.zip EyeGuard.app -x "*.DS_Store"
          echo "PACKAGED=true" >> $GITHUB_ENV

      - name: Set Tag Version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: EyeGuard v${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload App
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/EyeGuard.app.zip

      - name: Upload CLI
        uses: softprops/action-gh-release@v2
        with:
          files: eyeguard

      - name: Upload SKILL
        uses: softprops/action-gh-release@v2
        with:
          files: eyeguard-cli.SKILL.md

      - name: Upload install.sh
        uses: softprops/action-gh-release@v2
        with:
          files: scripts/install.sh

      - name: Generate & Upload README
        run: |
          cat > /tmp/README.md << 'README_EOF'
